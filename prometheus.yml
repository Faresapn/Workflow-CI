# prometheus.yml — Prometheus configuration
# Scrapes metrics from the inference service

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "inference-service"
    static_configs:
      - targets: ["inference:5001"]
    metrics_path: "/metrics"
    scrape_interval: 5s

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
